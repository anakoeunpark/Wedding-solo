<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>솔로 이벤트 💌</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafaf8; color: #1a1a1a; min-height: 100vh; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .page { display: none; }
    .page.active { display: block; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.25rem; }
    .sub { font-size: 14px; color: #666; margin-bottom: 1.75rem; line-height: 1.6; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
    input, textarea, select {
      width: 100%; border: 1px solid #e0e0e0; border-radius: 10px;
      padding: 11px 14px; font-size: 15px; background: #fff;
      color: #1a1a1a; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: #aaa; }
    textarea { resize: none; height: 84px; }
    .field { margin-bottom: 1rem; }
    .btn {
      width: 100%; padding: 13px; border-radius: 10px;
      border: 1px solid #ddd; background: #fff; color: #1a1a1a;
      font-size: 15px; font-family: inherit; cursor: pointer; margin-top: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: #f2f2f0; }
    .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn.primary:hover { background: #333; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .gender-toggle { display: flex; gap: 8px; }
    .gtab {
      flex: 1; padding: 11px; border: 1px solid #e0e0e0; border-radius: 10px;
      background: #fff; color: #888; font-size: 15px; cursor: pointer;
      text-align: center; transition: all 0.15s; user-select: none;
    }
    .gtab.sel-m { background: #EBF3FC; color: #1a5fa8; border-color: #93bde8; font-weight: 600; }
    .gtab.sel-f { background: #FCEBf3; color: #a8185f; border-color: #e893c0; font-weight: 600; }
    .error { font-size: 13px; color: #d0392b; margin-top: 6px; }
    .card {
      background: #fff; border: 1px solid #ebebeb; border-radius: 14px;
      padding: 1rem 1.25rem; margin-bottom: 0.75rem;
    }
    .badge {
      display: inline-block; font-size: 11px; padding: 2px 8px;
      border-radius: 999px; background: #f0f0ee; color: #666;
      border: 1px solid #e8e8e5;
    }
    .badge-m { background: #EBF3FC; color: #1a5fa8; border-color: #93bde8; }
    .badge-f { background: #FCEBf3; color: #a8185f; border-color: #e893c0; }
    .center { text-align: center; }
    .success-wrap { text-align: center; padding: 3rem 1rem; }
    .tab-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .tab {
      flex: 1; padding: 9px; border: 1px solid #e0e0e0; border-radius: 10px;
      background: #fff; color: #888; font-size: 13px; cursor: pointer; text-align: center;
    }
    .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .lotto-stage {
      text-align: center; background: #f5f4f1; border-radius: 16px;
      padding: 1.75rem 1rem; margin-bottom: 1rem;
    }
    .balls { display: flex; justify-content: center; align-items: center; gap: 1.5rem; margin: 1rem 0; }
    .ball {
      width: 88px; height: 88px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 13px;
      font-weight: 600; text-align: center; line-height: 1.35; padding: 8px;
      border: 1px solid #e0e0e0; background: #fff; color: #aaa;
      transition: all 0.3s;
    }
    .ball.male { background: #EBF3FC; color: #1a5fa8; border-color: #93bde8; }
    .ball.female { background: #FCEBf3; color: #a8185f; border-color: #e893c0; }
    .ball.spin { animation: blink 0.25s linear infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .divider { height: 1px; background: #ebebeb; margin: 1rem 0; }
    .empty { text-align: center; padding: 2.5rem 1rem; font-size: 14px; color: #aaa; }
    .hist-item {
      background: #fff; border: 1px solid #ebebeb; border-radius: 14px;
      padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 12px;
    }
    .admin-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .count-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .pill {
      font-size: 12px; padding: 3px 10px; border-radius: 999px;
      background: #f0f0ee; color: #555; border: 1px solid #e8e8e5;
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- 게스트 입력 -->
  <div id="page-guest" class="page active">
    <h1>솔로 이벤트 💌</h1>
    <p class="sub">고운 &amp; 재원의 결혼을 축하하며<br>솔로라면 번호를 올려주세요!</p>
    <div class="field">
      <label>이름</label>
      <input type="text" id="g-name" placeholder="홍길동" />
    </div>
    <div class="field">
      <label>별명 <span style="color:#aaa;font-size:12px;">선택</span></label>
      <input type="text" id="g-nick" placeholder="예: 요리왕, 웃음폭탄" />
    </div>
    <div class="field">
      <label>성별</label>
      <div class="gender-toggle">
        <div class="gtab" id="btn-m" onclick="selGender('M')">남자</div>
        <div class="gtab" id="btn-f" onclick="selGender('F')">여자</div>
      </div>
    </div>
    <div class="field">
      <label>한 줄 소개 <span style="color:#aaa;font-size:12px;">선택</span></label>
      <textarea id="g-intro" placeholder="취미, 직업, 매력 포인트 자유롭게 :)"></textarea>
    </div>
    <div class="field">
      <label>연락처 <span style="color:#aaa;font-size:12px;">관리자에게만 공개</span></label>
      <input type="tel" id="g-phone" placeholder="010-0000-0000" />
    </div>
    <div id="g-err" class="error" style="display:none;"></div>
    <button class="btn primary" onclick="submitGuest()">번호 올리기</button>
    <button class="btn" style="margin-top:8px;" onclick="showPage('admin-login')">관리자 입장</button>
  </div>

  <!-- 등록 완료 -->
  <div id="page-success" class="page">
    <div class="success-wrap">
      <div style="font-size:52px;margin-bottom:1rem;">🎉</div>
      <h1>등록 완료!</h1>
      <p class="sub" style="margin-top:0.75rem;">MC가 곧 매칭을 발표할 거예요.<br>두근두근 기대해주세요!</p>
      <button class="btn primary" style="margin-top:1.5rem;" onclick="showPage('guest')">처음으로</button>
    </div>
  </div>

  <!-- 관리자 로그인 -->
  <div id="page-admin-login" class="page">
    <h1>관리자 입장</h1>
    <p class="sub">비밀번호를 입력해주세요.</p>
    <div class="field">
      <input type="password" id="pw" placeholder="****" onkeydown="if(event.key==='Enter')checkPw()" />
    </div>
    <div id="pw-err" class="error" style="display:none;">비밀번호가 틀렸어요.</div>
    <button class="btn primary" onclick="checkPw()">입장</button>
    <button class="btn" style="margin-top:8px;" onclick="showPage('guest')">돌아가기</button>
  </div>

  <!-- 관리자 메인 -->
  <div id="page-admin" class="page">
    <div class="admin-top">
      <h1>관리자</h1>
      <div class="count-pills" id="cnt-pills"></div>
    </div>
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('list',this)">목록</div>
      <div class="tab" onclick="switchTab('match',this)">매칭</div>
      <div class="tab" onclick="switchTab('history',this)">기록</div>
    </div>
    <div id="tab-list" class="tab-content active">
      <div id="guest-list"></div>
      <button class="btn" style="margin-top:6px;color:#c0392b;" onclick="if(confirm('전체 초기화할까요?'))resetAll()">전체 초기화</button>
    </div>
    <div id="tab-match" class="tab-content">
      <div class="lotto-stage">
        <div style="font-size:13px;color:#888;margin-bottom:0.5rem;">남녀 각 한 명씩 랜덤 추첨</div>
        <div class="balls">
          <div class="ball" id="ball-m">남자<br>?</div>
          <div style="font-size:22px;color:#ccc;">♥</div>
          <div class="ball" id="ball-f">여자<br>?</div>
        </div>
        <button class="btn primary" id="match-btn" onclick="doMatch()" style="max-width:180px;margin:0 auto 0.75rem;">추첨하기</button>
        <div id="match-status" style="font-size:13px;color:#888;min-height:18px;"></div>
      </div>
      <div id="match-detail" style="display:none;" class="card"></div>
    </div>
    <div id="tab-history" class="tab-content">
      <div id="match-history"></div>
    </div>
    <div class="divider"></div>
    <button class="btn" onclick="showPage('guest')">게스트 화면으로</button>
  </div>

</div>
<script>
const PASS = '1234';
let guests = [], matches = [], gender = null;

try { guests = JSON.parse(localStorage.getItem('ws_g')||'[]'); } catch(e){}
try { matches = JSON.parse(localStorage.getItem('ws_m')||'[]'); } catch(e){}

function save() {
  localStorage.setItem('ws_g', JSON.stringify(guests));
  localStorage.setItem('ws_m', JSON.stringify(matches));
}
function showPage(n) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
}
function selGender(g) {
  gender = g;
  document.getElementById('btn-m').className = 'gtab'+(g==='M'?' sel-m':'');
  document.getElementById('btn-f').className = 'gtab'+(g==='F'?' sel-f':'');
}
function err(id, msg) {
  const el = document.getElementById(id);
  el.style.display = msg ? 'block' : 'none';
  if(msg) el.textContent = msg;
}
function submitGuest() {
  const name = document.getElementById('g-name').value.trim();
  const nick = document.getElementById('g-nick').value.trim();
  const intro = document.getElementById('g-intro').value.trim();
  const phone = document.getElementById('g-phone').value.trim();
  if (!name) return err('g-err','이름을 입력해주세요!');
  if (!gender) return err('g-err','성별을 선택해주세요!');
  if (!phone) return err('g-err','연락처를 입력해주세요!');
  if (guests.find(g=>g.name===name)) return err('g-err','이미 등록된 이름이에요.');
  err('g-err','');
  guests.push({ id: Date.now(), name, nick, gender, intro, phone, matched: false });
  save();
  ['g-name','g-nick','g-intro','g-phone'].forEach(id=>document.getElementById(id).value='');
  selGender(null); gender=null;
  showPage('success');
}
function checkPw() {
  if (document.getElementById('pw').value === PASS) {
    document.getElementById('pw-err').style.display='none';
    document.getElementById('pw').value='';
    renderAdmin(); showPage('admin');
  } else {
    document.getElementById('pw-err').style.display='block';
  }
}
function updateCounts() {
  const ms=guests.filter(g=>g.gender==='M'), fs=guests.filter(g=>g.gender==='F');
  document.getElementById('cnt-pills').innerHTML =
    `<span class="pill" style="background:#EBF3FC;color:#1a5fa8;border-color:#93bde8;">남 ${ms.length}명 (미매칭 ${ms.filter(g=>!g.matched).length})</span>
     <span class="pill" style="background:#FCEBf3;color:#a8185f;border-color:#e893c0;">여 ${fs.length}명 (미매칭 ${fs.filter(g=>!g.matched).length})</span>`;
}
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='list') renderList();
  if(name==='history') renderHistory();
}
function renderAdmin() { updateCounts(); renderList(); }
function renderList() {
  const el = document.getElementById('guest-list');
  if (!guests.length) { el.innerHTML='<div class="empty">아직 등록된 참가자가 없어요.</div>'; return; }
  el.innerHTML = guests.map(g=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <span style="font-weight:600;font-size:15px;">${g.name}</span>
          ${g.nick?`<span style="font-size:13px;color:#888;margin-left:5px;">"${g.nick}"</span>`:''}
          <span class="badge ${g.gender==='M'?'badge-m':'badge-f'}" style="margin-left:6px;">${g.gender==='M'?'남':'여'}</span>
          ${g.matched?'<span class="badge" style="margin-left:4px;">매칭됨</span>':''}
        </div>
        <button onclick="removeGuest(${g.id})" style="background:none;border:none;cursor:pointer;color:#bbb;font-size:20px;line-height:1;padding:0 2px;">×</button>
      </div>
      ${g.intro?`<div style="font-size:13px;color:#555;margin-top:6px;line-height:1.5;">${g.intro}</div>`:''}
      <div style="font-size:12px;color:#aaa;margin-top:5px;">${g.phone}</div>
    </div>
  `).join('');
}
function removeGuest(id) {
  if(!confirm('삭제할까요?')) return;
  guests = guests.filter(g=>g.id!==id);
  save(); renderAdmin();
}
function resetAll() {
  guests=[]; matches=[]; save(); renderAdmin();
  document.getElementById('match-detail').style.display='none';
  document.getElementById('match-status').textContent='';
  resetBalls(); renderHistory();
}
function resetBalls() {
  ['ball-m','ball-f'].forEach((id,i)=>{
    const b=document.getElementById(id);
    b.className='ball'; b.innerHTML=`${i===0?'남자':'여자'}<br>?`;
  });
}
function doMatch() {
  const mp=guests.filter(g=>g.gender==='M'&&!g.matched);
  const fp=guests.filter(g=>g.gender==='F'&&!g.matched);
  const st=document.getElementById('match-status');
  if(!mp.length||!fp.length){
    st.textContent=!mp.length?'미매칭 남성이 없어요.':'미매칭 여성이 없어요.'; return;
  }
  const btn=document.getElementById('match-btn');
  btn.disabled=true;
  const bm=document.getElementById('ball-m'), bf=document.getElementById('ball-f');
  bm.className='ball spin'; bf.className='ball spin';
  document.getElementById('match-detail').style.display='none';
  st.textContent='두근두근...';
  const allM=guests.filter(g=>g.gender==='M'), allF=guests.filter(g=>g.gender==='F');
  let ticks=0;
  const iv=setInterval(()=>{
    ticks++;
    const rm=allM[Math.floor(Math.random()*allM.length)];
    const rf=allF[Math.floor(Math.random()*allF.length)];
    bm.innerHTML=`<span style="font-size:13px;">${rm.name}</span>`;
    bf.innerHTML=`<span style="font-size:13px;">${rf.name}</span>`;
    if(ticks>=20){
      clearInterval(iv);
      const wm=mp[Math.floor(Math.random()*mp.length)];
      const wf=fp[Math.floor(Math.random()*fp.length)];
      wm.matched=true; wf.matched=true;
      const rec={
        a:wm.name,aNick:wm.nick,aPhone:wm.phone,aIntro:wm.intro,
        b:wf.name,bNick:wf.nick,bPhone:wf.phone,bIntro:wf.intro,
        time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})
      };
      matches.push(rec); save(); updateCounts();
      bm.className='ball male';
      bm.innerHTML=`<span style="font-size:13px;font-weight:600;">${wm.name}${wm.nick?`<br><span style="font-size:11px;font-weight:400;">"${wm.nick}"</span>`:''}</span>`;
      bf.className='ball female';
      bf.innerHTML=`<span style="font-size:13px;font-weight:600;">${wf.name}${wf.nick?`<br><span style="font-size:11px;font-weight:400;">"${wf.nick}"</span>`:''}</span>`;
      const mL=guests.filter(g=>g.gender==='M'&&!g.matched).length;
      const fL=guests.filter(g=>g.gender==='F'&&!g.matched).length;
      st.textContent=`남은 미매칭: 남자 ${mL}명 · 여자 ${fL}명`;
      btn.disabled=false;
      const det=document.getElementById('match-detail');
      det.innerHTML=`
        <div style="font-size:12px;color:#aaa;margin-bottom:10px;">${rec.time} 매칭</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div>
            <span class="badge badge-m">남자</span>
            <div style="font-weight:600;font-size:15px;margin-top:5px;">${wm.name}${wm.nick?` <span style="font-weight:400;font-size:13px;color:#888;">"${wm.nick}"</span>`:''}</div>
            ${wm.intro?`<div style="font-size:12px;color:#666;margin-top:4px;line-height:1.5;">${wm.intro}</div>`:''}
            <div style="font-size:12px;color:#aaa;margin-top:4px;">${wm.phone}</div>
          </div>
          <div>
            <span class="badge badge-f">여자</span>
            <div style="font-weight:600;font-size:15px;margin-top:5px;">${wf.name}${wf.nick?` <span style="font-weight:400;font-size:13px;color:#888;">"${wf.nick}"</span>`:''}</div>
            ${wf.intro?`<div style="font-size:12px;color:#666;margin-top:4px;line-height:1.5;">${wf.intro}</div>`:''}
            <div style="font-size:12px;color:#aaa;margin-top:4px;">${wf.phone}</div>
          </div>
        </div>`;
      det.style.display='block';
    }
  },120);
}
function renderHistory() {
  const el=document.getElementById('match-history');
  if(!matches.length){el.innerHTML='<div class="empty">아직 매칭 기록이 없어요.</div>';return;}
  el.innerHTML=[...matches].reverse().map(m=>`
    <div class="hist-item">
      <div style="font-size:22px;">❤️</div>
      <div>
        <div style="font-weight:600;font-size:14px;">${m.a}${m.aNick?` "${m.aNick}"`:''} &amp; ${m.b}${m.bNick?` "${m.bNick}"`:''}</div>
        <div style="font-size:12px;color:#aaa;margin-top:2px;">${m.aPhone} · ${m.bPhone} · ${m.time}</div>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
